<button id="addHeaderBtn" class="w-8 h-8 border border-jaferBorder rounded-md bg-transparent text-jaferText inline-flex items-center justify-center transition-all duration-200 cursor-pointer hover:bg-githubHoverBg hover:border-githubSubtext hover:text-githubText"><i class="fas fa-circle-plus text-base"></i></button>

<script>
// Global state
let currentCombinedResult = null;
let currentDB = null;
let isFetching = false;
let isCreatingDb = false;
// DOM elements
const fetchBtn = document.getElementById('fetchDataBtn');
const createDbBtn = document.getElementById('createDbBtn');
const downloadJsonBtn = document.getElementById('downloadJsonBtn');
const copyJsonBtn = document.getElementById('copyJsonBtn');
const downloadDbBtn = document.getElementById('downloadDbBtn');
const preElement = document.getElementById('pre');
const loader = document.getElementById('loader');
const statusSpan = document.getElementById('statusMsg');

//const TOKEN = localStorage.getItem('github_token');
//const TOKEN = document.getElementById("github_token").value;
//const headers = TOKEN ? { 'Authorization': `Bearer ${TOKEN}` } : {};
//document.getElementById("github_token").value = TOKEN;

function updateStatus(msg, isError = false) {
  statusSpan.innerText = msg;
  if (isError) console.error(msg);
  else console.log(msg);
}

function setLoading(loading) {
  if (loading) loader.classList.remove('hidden');
  else loader.classList.add('hidden');
}

function enableButtons(fetchDone, dbDone) {
  // fetchDone: true means fetch completed and JSON loaded
  // dbDone: true means database has been created
  createDbBtn.disabled = !fetchDone || isCreatingDb;
  downloadJsonBtn.disabled = !fetchDone;
  copyJsonBtn.disabled = !fetchDone;
  downloadDbBtn.disabled = !dbDone;
}

// Helper to get nested
function getNested(obj, path) {
  return path.split('.').reduce((current, key) => current?.[key], obj);
}

// ---------- Fetch Data ----------
async function fetchData() {
  if (isFetching) return;
  isFetching = true;
  setLoading(true);
  updateStatus("Starting GitHub data fetch…");
  fetchBtn.disabled = true;
  const TOKEN = document.getElementById("github_token").value;
const headers = TOKEN ? { 'Authorization': `Bearer ${TOKEN}` } : {};
  localStorage.setItem('github_token', TOKEN);
  
  const userEndpoint = { name: 'User', url: 'https://api.github.com/users/otapt2011' };
  const reposEndpoint = { name: 'Repositories', url: 'https://api.github.com/users/otapt2011/repos?per_page=30&page=1&sort=updated&direction=desc' };
  
  let userData = null;
  let reposData = [];
  
  try {
    // Fetch user
    updateStatus("Fetching user profile…");
    const userRes = await fetch(userEndpoint.url, { headers });
    if (!userRes.ok) throw new Error(`HTTP ${userRes.status}`);
    const userJson = await userRes.json();
    const rawUser = userJson.user || userJson;
    userData = {
      id: rawUser.id, node_id: rawUser.node_id, name: rawUser.name, login: rawUser.login,
      email: rawUser.email, avatar_url: rawUser.avatar_url, html_url: rawUser.html_url,
      url: rawUser.url, created_at: rawUser.created_at
    };
    updateStatus(`User fetched: ${userData.login}`);
    
    // Fetch repos
    updateStatus("Fetching repositories list…");
    const reposRes = await fetch(reposEndpoint.url, { headers });
    if (!reposRes.ok) throw new Error(`HTTP ${reposRes.status}`);
    const reposJson = await reposRes.json();
    const rawRepos = reposJson.repositories || reposJson;
    if (!Array.isArray(rawRepos)) throw new Error('Expected array');
    
    reposData = rawRepos.map(repo => ({
      id: repo.id, node_id: repo.node_id, full_name: repo.full_name, name: repo.name,
      url: repo.url, trees_url: repo.trees_url, private: repo.private, size: repo.size,
      owner_type: getNested(repo, 'owner.type'), owner_url: getNested(repo, 'owner.url'),
      owner_id: getNested(repo, 'owner.id'), owner_node_id: getNested(repo, 'owner.node_id'),
      owner_html_url: getNested(repo, 'owner.html_url'), language: repo.language,
      created_at: repo.created_at, default_branch: repo.default_branch,
      deployments_url: repo.deployments_url, languages: null, tree: null
    }));
    
    updateStatus(`Found ${reposData.length} repositories. Fetching languages & file contents…`);
    
    let processed = 0;
    await Promise.all(reposData.map(async (repo) => {
      const languagesUrl = `https://api.github.com/repos/otapt2011/${repo.name}/languages`;
      const contentsUrl = `https://api.github.com/repos/otapt2011/${repo.name}/contents?ref=main`;
      const [langRes, contentsRes] = await Promise.all([fetch(languagesUrl, { headers }), fetch(contentsUrl, { headers })]);
      
      if (langRes.ok) repo.languages = await langRes.json();
      else repo.languages = { error: `HTTP ${langRes.status}` };
      
      if (contentsRes.ok) {
        const contentsData = await contentsRes.json();
        if (Array.isArray(contentsData)) {
          repo.tree = contentsData.map(item => ({
            name: item.name, path: item.path, sha: item.sha, size: item.size, type: item.type,
            url: item.url, download_url: item.download_url, html_url: item.html_url, file: null
          }));
          const fileItems = repo.tree.filter(i => i.type === 'file');
          await Promise.all(fileItems.map(async (fileItem) => {
            const fileUrl = `https://api.github.com/repos/otapt2011/${repo.name}/contents/${fileItem.path}?ref=main`;
            try {
              const fRes = await fetch(fileUrl, { headers });
              if (fRes.ok) {
                const fd = await fRes.json();
                fileItem.file = {
                  content: fd.content, download_url: fd.download_url, encoding: fd.encoding,
                  html_url: fd.html_url, name: fd.name, path: fd.path, sha: fd.sha,
                  size: fd.size, type: fd.type, url: fd.url
                };
              } else fileItem.file = { error: `HTTP ${fRes.status}` };
            } catch (err) { fileItem.file = { error: err.message }; }
          }));
        } else repo.tree = { error: 'Expected array from contents API' };
      } else repo.tree = { error: `HTTP ${contentsRes.status}` };
      processed++;
      updateStatus(`Processed ${processed}/${reposData.length} repos (${repo.name})`);
    }));
    
    currentCombinedResult = { user: userData, repositories: reposData };
    const jsonStr = JSON.stringify(currentCombinedResult, null, 2);
    preElement.innerHTML = jsonStr;
    updateStatus("Fetch completed. Click 'Create Database' to build SQLite DB.");
    enableButtons(true, false);
  } catch (err) {
    updateStatus(`Fetch error: ${err.message}`, true);
    preElement.innerHTML = `Error: ${err.message}`;
    enableButtons(false, false);
  } finally {
    isFetching = false;
    setLoading(false);
    fetchBtn.disabled = false;
  }
}

// ---------- Create Database ----------
async function createDatabase() {
  if (!currentCombinedResult || isCreatingDb) return;
  isCreatingDb = true;
  setLoading(true);
  updateStatus("Initialising SQLite engine…");
  createDbBtn.disabled = true;
  downloadDbBtn.disabled = true;
  
  try {
    if (!window.JaferSQL) throw new Error("JaferSQL not loaded");
    const db = await window.JaferSQL.jaferInit();
    currentDB = db;
    updateStatus("Creating tables…");
    
    // Create tables
    db.jaferRun(`CREATE TABLE IF NOT EXISTS users (
      id INTEGER PRIMARY KEY, node_id TEXT UNIQUE, name TEXT, login TEXT,
      email TEXT, avatar_url TEXT, html_url TEXT, url TEXT, created_at TEXT
    )`);
    db.jaferRun(`CREATE TABLE IF NOT EXISTS repositories (
      id INTEGER PRIMARY KEY, node_id TEXT UNIQUE, full_name TEXT, name TEXT,
      url TEXT, trees_url TEXT, private INTEGER, size INTEGER, owner_type TEXT,
      owner_url TEXT, owner_id INTEGER, owner_node_id TEXT, owner_html_url TEXT,
      language TEXT, created_at TEXT, default_branch TEXT, deployments_url TEXT,
      user_id INTEGER, FOREIGN KEY(user_id) REFERENCES users(id)
    )`);
    db.jaferRun(`CREATE TABLE IF NOT EXISTS languages (
      id INTEGER PRIMARY KEY, repo_id INTEGER, language_name TEXT, bytes INTEGER,
      FOREIGN KEY(repo_id) REFERENCES repositories(id)
    )`);
    db.jaferRun(`CREATE TABLE IF NOT EXISTS tree_items (
      id INTEGER PRIMARY KEY, repo_id INTEGER, name TEXT, path TEXT, sha TEXT,
      size INTEGER, type TEXT CHECK(type IN ('file','dir')), url TEXT,
      download_url TEXT, html_url TEXT, file_encoding TEXT,
      FOREIGN KEY(repo_id) REFERENCES repositories(id)
    )`);
    db.jaferRun(`CREATE TABLE IF NOT EXISTS file_contents (
      id INTEGER PRIMARY KEY, tree_item_id INTEGER UNIQUE NOT NULL,
      content TEXT, encoding TEXT,
      FOREIGN KEY(tree_item_id) REFERENCES tree_items(id) ON DELETE CASCADE
    )`);
    
    updateStatus("Inserting data…");
    db.jaferRun("BEGIN");
    
    const u = currentCombinedResult.user;
    db.jaferRun(`INSERT OR REPLACE INTO users (id, node_id, name, login, email, avatar_url, html_url, url, created_at)
                 VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?)`,
      [u.id, u.node_id, u.name, u.login, u.email, u.avatar_url, u.html_url, u.url, u.created_at]);
    
    let repoCount = 0;
    for (const repo of currentCombinedResult.repositories) {
      if (repo.error) continue;
      db.jaferRun(`INSERT OR REPLACE INTO repositories 
        (id, node_id, full_name, name, url, trees_url, private, size, owner_type,
         owner_url, owner_id, owner_node_id, owner_html_url, language, created_at,
         default_branch, deployments_url, user_id)
        VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)`,
        [repo.id, repo.node_id, repo.full_name, repo.name, repo.url, repo.trees_url,
         repo.private ? 1 : 0, repo.size, repo.owner_type, repo.owner_url, repo.owner_id,
         repo.owner_node_id, repo.owner_html_url, repo.language, repo.created_at,
         repo.default_branch, repo.deployments_url, u.id]);
      
      if (repo.languages && typeof repo.languages === 'object' && !repo.languages.error) {
        for (const [lang, bytes] of Object.entries(repo.languages)) {
          db.jaferRun(`INSERT INTO languages (repo_id, language_name, bytes) VALUES (?, ?, ?)`,
            [repo.id, lang, bytes]);
        }
      }
      
      if (Array.isArray(repo.tree) && !repo.tree.error) {
        for (const item of repo.tree) {
          const enc = item.file?.encoding || null;
          db.jaferRun(`INSERT INTO tree_items 
            (repo_id, name, path, sha, size, type, url, download_url, html_url, file_encoding)
            VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?)`,
            [repo.id, item.name, item.path, item.sha, item.size, item.type,
             item.url, item.download_url, item.html_url, enc]);
          const lastId = db.jaferGet("SELECT last_insert_rowid() as id").id;
          if (item.type === 'file' && item.file && item.file.content) {
            db.jaferRun(`INSERT INTO file_contents (tree_item_id, content, encoding) VALUES (?, ?, ?)`,
              [lastId, item.file.content, item.file.encoding || null]);
          }
        }
      }
      repoCount++;
      updateStatus(`Inserted ${repoCount}/${currentCombinedResult.repositories.length} repos…`);
    }
    db.jaferRun("COMMIT");
    updateStatus(`✅ Database created! Tables: ${db.jaferTables().length}, Repos: ${repoCount}`);
    enableButtons(true, true);
  } catch (err) {
    updateStatus(`DB creation failed: ${err.message}`, true);
    if (currentDB) try { currentDB.jaferRun("ROLLBACK"); } catch(e) {}
    enableButtons(true, false);
  } finally {
    isCreatingDb = false;
    setLoading(false);
    createDbBtn.disabled = false;
  }
}

// ---------- Download JSON ----------
function downloadJSON() {
  if (!currentCombinedResult) return;
  const jsonStr = JSON.stringify(currentCombinedResult, null, 2);
  const blob = new Blob([jsonStr], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `github_${currentCombinedResult.user?.login || "user"}_repos.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  updateStatus("JSON downloaded.");
}

// ---------- Copy JSON ----------
async function copyJSON() {
  if (!currentCombinedResult) return;
  const jsonStr = JSON.stringify(currentCombinedResult, null, 2);
  try {
    await navigator.clipboard.writeText(jsonStr);
    const original = copyJsonBtn.innerHTML;
    copyJsonBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
    setTimeout(() => { copyJsonBtn.innerHTML = original; }, 1500);
    updateStatus("JSON copied to clipboard.");
  } catch (err) {
    updateStatus("Copy failed: " + err.message, true);
  }
}

// ---------- Download Database ----------
function downloadDatabase() {
  if (!currentDB) {
    alert("No database created yet. Please create it first.");
    return;
  }
  try {
    const dbData = currentDB.jaferExport();
    const blob = new Blob([dbData], { type: "application/x-sqlite3" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `github_${currentCombinedResult?.user?.login || "user"}_data.db`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    updateStatus("Database file downloaded.");
  } catch (err) {
    updateStatus("Export failed: " + err.message, true);
  }
}

// Attach event listeners
fetchBtn.addEventListener('click', fetchData);
createDbBtn.addEventListener('click', createDatabase);
downloadJsonBtn.addEventListener('click', downloadJSON);
copyJsonBtn.addEventListener('click', copyJSON);
downloadDbBtn.addEventListener('click', downloadDatabase);

// Initial state: no data loaded
enableButtons(false, false);
</script>
